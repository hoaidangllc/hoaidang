<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thành viên | Kết Nối Việt Mỹ</title>
  <meta name="description" content="Danh sách hồ sơ thành viên trên Kết Nối Việt Mỹ." />
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <header class="main-header">
    <div class="container header-inner">
      <div class="logo"><a href="/">Kết Nối Việt Mỹ</a></div>
      <nav class="nav">
        <a href="./index.html">Trang chủ</a>
        <a href="./profiles.html" class="active">Thành viên</a>
        <a href="./register.html">Tạo hồ sơ</a>
        <a href="./live.html">Live cuối tuần</a>
      </nav>
      <div class="auth-box">
        <span id="authUser" class="auth-user"></span>
        <button id="loginBtn" class="btn btn-primary" type="button">Đăng nhập Google</button>
        <button id="logoutBtn" class="btn btn-outline" type="button" style="display:none;">Đăng xuất</button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container section-head">
      <h1>Danh sách thành viên</h1>
      <p>Dữ liệu đang dùng localStorage để test nhanh trước khi nối Firebase.</p>
    </div>

    <div class="container cards-grid" id="profilesList"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 Kết Nối Việt Mỹ</p>
    </div>
  </footer>

  <script>
    const profilesList = document.getElementById('profilesList');
    const profiles = JSON.parse(localStorage.getItem('ketnoi_profiles') || '[]');

    function renderProfiles() {
      if (!profiles.length) {
        profilesList.innerHTML = `
          <div class="card empty-card">
            <h3>Chưa có hồ sơ nào</h3>
            <p>Hãy là người đầu tiên tạo hồ sơ để test hệ thống.</p>
            <a class="btn btn-primary" href="./register.html">Tạo hồ sơ</a>
          </div>
        `;
        return;
      }

      profilesList.innerHTML = profiles.map((p, index) => `
        <article class="card profile-card">
          <div class="profile-top">
            <div class="avatar-circle">${(p.name || '?').trim().charAt(0).toUpperCase()}</div>
            <div>
              <h3>${p.name || 'Ẩn danh'}</h3>
              <p>${p.age || ''} • ${p.state || ''}</p>
            </div>
          </div>
          <p><strong>Nghề nghiệp:</strong> ${p.job || 'Chưa cập nhật'}</p>
          <p><strong>Mục tiêu:</strong> ${p.goal || 'Kết nối'}</p>
          <p class="clamp-3">${p.bio || ''}</p>
          <a class="btn btn-outline" href="./profile.html?id=${index}">Xem chi tiết</a>
        </article>
      `).join('');
    }

    renderProfiles();
  </script>
  <script type="module" src="/assets/js/auth.js"></script>
</body>
</html>
