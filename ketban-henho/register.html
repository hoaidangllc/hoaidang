  <script>
    const loginNotice = document.getElementById('loginNotice');
    const profileForm = document.getElementById('profileForm');
    const successBox = document.getElementById('successBox');

    window.showKetNoiForm = function(user) {
      loginNotice.style.display = 'none';
      profileForm.style.display = 'block';
      successBox.style.display = 'none';

      const savedName = document.getElementById('name');
      const savedContact = document.getElementById('contact');

      if (user?.displayName && !savedName.value) savedName.value = user.displayName;
      if (user?.email && !savedContact.value) savedContact.value = user.email;
    };

    window.hideKetNoiForm = function() {
      loginNotice.style.display = 'block';
      profileForm.style.display = 'none';
      successBox.style.display = 'none';
    };

    profileForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById('name').value.trim(),
        age: document.getElementById('age').value.trim(),
        state: document.getElementById('state').value.trim(),
        job: document.getElementById('job').value.trim(),
        goal: document.getElementById('goal').value.trim(),
        hobby: document.getElementById('hobby').value.trim(),
        contact: document.getElementById('contact').value.trim(),
        bio: document.getElementById('bio').value.trim(),
        createdAt: new Date().toISOString()
      };

      const current = JSON.parse(localStorage.getItem('ketnoi_profiles') || '[]');
      current.unshift(data);
      localStorage.setItem('ketnoi_profiles', JSON.stringify(current));

      profileForm.reset();
      profileForm.style.display = 'none';
      successBox.style.display = 'block';
    });
  </script>
  <script type="module" src="/assets/js/auth.js"></script>
