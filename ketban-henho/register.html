<script>
window.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("form");
  const successMessage = document.getElementById("successMessage");
  const loginRequiredBox = document.getElementById("loginRequiredBox");
  const loginBtnInline = document.getElementById("loginBtnInline");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");

  if (loginBtnInline && loginBtn) {
    loginBtnInline.addEventListener("click", () => loginBtn.click());
  }

  function isLoggedIn() {
    if (!loginBtn || !logoutBtn) return false;

    const loginBtnHidden =
      loginBtn.style.display === "none" ||
      window.getComputedStyle(loginBtn).display === "none";

    const logoutBtnVisible =
      logoutBtn.style.display !== "none" &&
      window.getComputedStyle(logoutBtn).display !== "none";

    return loginBtnHidden || logoutBtnVisible;
  }

  function updateRegisterUI() {
    const loggedIn = isLoggedIn();

    if (loggedIn) {
      form.style.display = "block";
      loginRequiredBox.style.display = "none";
    } else {
      form.style.display = "none";
      loginRequiredBox.style.display = "block";
    }
  }

  updateRegisterUI();

  setTimeout(updateRegisterUI, 500);
  setTimeout(updateRegisterUI, 1200);
  setTimeout(updateRegisterUI, 2000);
  setTimeout(updateRegisterUI, 3500);

  const observer = new MutationObserver(() => {
    updateRegisterUI();
  });

  if (logoutBtn) {
    observer.observe(logoutBtn, {
      attributes: true,
      attributeFilter: ["style", "class"]
    });
  }

  if (loginBtn) {
    observer.observe(loginBtn, {
      attributes: true,
      attributeFilter: ["style", "class"]
    });
  }

  window.addEventListener("focus", updateRegisterUI);
  document.addEventListener("visibilitychange", updateRegisterUI);

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    if (!isLoggedIn()) {
      updateRegisterUI();
      return;
    }

    const data = Object.fromEntries(new FormData(form));
    data.id = Date.now();

    let users = JSON.parse(localStorage.getItem("users") || "[]");
    users.push(data);
    localStorage.setItem("users", JSON.stringify(users));

    successMessage.style.display = "block";

    setTimeout(() => {
      window.location = "profiles.html";
    }, 700);
  });
});
</script>
