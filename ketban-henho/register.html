<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký hồ sơ | Kết Nối Việt Mỹ</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a href="/" class="brand">
      <span class="brand-badge">❤</span>
      <span>Kết Nối Việt Mỹ</span>
    </a>

    <nav class="nav-links">
      <a href="/">Trang chủ</a>
      <a href="./profiles.html">Thành viên</a>
      <a href="./register.html">Đăng ký</a>
      <a href="./live.html">Lịch live</a>

      <span id="authUser" class="auth-user"></span>

      <button id="loginBtn" class="btn btn-secondary">Đăng nhập Google</button>
      <button id="logoutBtn" class="btn btn-secondary" style="display:none;">Đăng xuất</button>
    </nav>
  </div>
</header>

<main>
  <section class="section">
    <div class="container form-wrap">

      <!-- 🔴 CHƯA LOGIN -->
      <div id="loginRequiredBox" class="form-card" style="display:none; margin-bottom:20px;">
        <h2>Bạn cần đăng nhập trước</h2>
        <p>Vui lòng đăng nhập Google để tạo hồ sơ.</p>

        <div class="hero-actions">
          <button id="loginBtnInline" class="btn btn-primary">Đăng nhập Google</button>
        </div>
      </div>

      <!-- 🟢 FORM -->
      <div class="form-card">
        <h2>Tạo hồ sơ</h2>

        <form id="form">
          <input name="name" placeholder="Tên" required><br><br>
          <input name="age" placeholder="Tuổi" required><br><br>
          <input name="job" placeholder="Công việc"><br><br>
          <input name="city" placeholder="Thành phố"><br><br>
          <input name="state" placeholder="Bang"><br><br>
          <input name="link" placeholder="Link Facebook / TikTok"><br><br>

          <select name="liveSlot">
            <option>Thứ 7 • 7:30 PM</option>
            <option>Thứ 7 • 9:00 PM</option>
          </select><br><br>

          <button type="submit" class="btn btn-primary">Lưu hồ sơ</button>
        </form>

        <p id="successMessage" style="display:none;">Đã lưu, đang chuyển...</p>
      </div>

    </div>
  </section>
</main>

<!-- 🔥 SCRIPT CHUẨN -->
<script>
window.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("form");
  const loginRequiredBox = document.getElementById("loginRequiredBox");
  const successMessage = document.getElementById("successMessage");

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const loginBtnInline = document.getElementById("loginBtnInline");

  if (loginBtnInline) {
    loginBtnInline.onclick = () => loginBtn.click();
  }

  function isLoggedIn() {
    if (!loginBtn || !logoutBtn) return false;

    const loginHidden = window.getComputedStyle(loginBtn).display === "none";
    const logoutVisible = window.getComputedStyle(logoutBtn).display !== "none";

    return loginHidden || logoutVisible;
  }

  function updateUI() {
    if (isLoggedIn()) {
      form.style.display = "block";
      loginRequiredBox.style.display = "none";
    } else {
      form.style.display = "none";
      loginRequiredBox.style.display = "block";
    }
  }

  updateUI();

  // 🔥 theo dõi thay đổi login realtime
  const observer = new MutationObserver(updateUI);

  observer.observe(loginBtn, { attributes: true });
  observer.observe(logoutBtn, { attributes: true });

  // fallback
  setTimeout(updateUI, 500);
  setTimeout(updateUI, 1500);
  setTimeout(updateUI, 3000);

  // submit
  form.addEventListener("submit", (e) => {
    e.preventDefault();

    if (!isLoggedIn()) {
      updateUI();
      return;
    }

    const data = Object.fromEntries(new FormData(form));
    data.id = Date.now();

    let users = JSON.parse(localStorage.getItem("users") || "[]");
    users.push(data);
    localStorage.setItem("users", JSON.stringify(users));

    successMessage.style.display = "block";

    setTimeout(() => {
      window.location = "profiles.html";
    }, 800);
  });
});
</script>

<!-- 🔥 LOGIN CHUNG -->
<script type="module" src="/assets/js/auth.js"></script>

</body>
</html>
