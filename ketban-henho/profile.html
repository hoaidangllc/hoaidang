<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ thành viên | Kết Nối Việt Mỹ</title>
  <meta name="description" content="Xem hồ sơ chi tiết của thành viên trên Kết Nối Việt Mỹ.">
  <link rel="stylesheet" href="./assets/css/styles.css">

  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(255,45,120,.08), transparent 28%),
        radial-gradient(circle at top right, rgba(0,234,255,.07), transparent 24%),
        linear-gradient(135deg,#0c0c14,#141428);
      color:#fff;
    }

    .profile-shell {
      display:grid;
      grid-template-columns: 340px 1fr;
      gap:20px;
    }

    .glass-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(14px);
      border-radius: 26px;
      box-shadow: 0 25px 60px rgba(0,0,0,.35);
    }

    .profile-left,
    .profile-right {
      padding:22px;
    }

    .avatar-wrap {
      position:relative;
      width:180px;
      height:180px;
      margin:0 auto 18px;
    }

    .avatar-ring {
      position:absolute;
      inset:-3px;
      border-radius:50%;
      background: linear-gradient(135deg, rgba(255,45,120,.95), rgba(0,234,255,.9));
    }

    .profile-avatar {
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      border:4px solid rgba(16,16,24,.95);
      background:rgba(255,255,255,.05);
      z-index:1;
    }

    .profile-name {
      margin:0;
      text-align:center;
      font-size:1.55rem;
      color:#fff;
      letter-spacing:-.02em;
    }

    .profile-location {
      margin-top:8px;
      text-align:center;
      color:#bbb;
    }

    .profile-badges {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
      margin-top:16px;
    }

    .profile-badge {
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      font-size:.88rem;
      font-weight:700;
      color:#fff;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.09);
    }

    .profile-actions {
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:20px;
    }

    .profile-bio-box {
      margin-top:20px;
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .profile-bio-box h3 {
      margin:0 0 10px;
      font-size:1rem;
    }

    .profile-bio-box p {
      margin:0;
      color:#c9c9c9;
      line-height:1.65;
    }

    .info-grid {
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:14px;
    }

    .info-item {
      padding:16px;
      border-radius:20px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .info-item strong {
      display:block;
      margin-bottom:6px;
      color:#fff;
      font-size:.95rem;
    }

    .info-item .meta {
      color:#c7c7c7;
      line-height:1.5;
      word-break:break-word;
    }

    .btn-disabled {
      opacity:.6;
      pointer-events:none;
    }

    @media (max-width: 900px) {
      .profile-shell {
        grid-template-columns: 1fr;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a href="./index.html" class="brand">
      <span class="brand-badge">❤</span>
      <span>Kết Nối Việt Mỹ</span>
    </a>

    <nav class="nav-links">
      <a href="/">Về hoaidang.com</a>
      <a href="./profiles.html">Thành viên</a>
      <a href="./register.html">Đăng ký</a>
      <a href="./live.html">Lịch live</a>
      <a href="./my-profile.html">Hồ sơ của tôi</a>

      <span id="authUser" class="auth-user"></span>
      <button id="loginBtn" class="btn btn-secondary" type="button">Đăng nhập Google</button>
      <button id="logoutBtn" class="btn btn-secondary" type="button" style="display:none;">Đăng xuất</button>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container form-wrap">
      <div class="hero-card glass-card">
        <div class="eyebrow">👤 Hồ sơ thành viên</div>
        <h1>Xem kỹ hơn. <span>Biết rõ hơn trước khi kết nối.</span></h1>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container form-wrap">
      <div id="profileBox"></div>
    </div>
  </section>

  <section class="footer">
    <div class="container">
      © 2026 Kết Nối Việt Mỹ • TikTok:
      <a href="https://www.tiktok.com/@hoaidangllc" target="_blank">@hoaidangllc</a>
    </div>
  </section>
</main>

<script type="module" src="/assets/js/auth.js"></script>

<script type="module">
import { getProfileById } from "./assets/js/ketnoi-firebase.js";

const profileBox = document.getElementById("profileBox");
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const DEFAULT_AVATAR = "./image/default-avatar.png";

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function renderNotFound() {
  profileBox.innerHTML = `
    <div class="glass-card" style="padding:22px;">
      <h2>Không tìm thấy hồ sơ</h2>
      <p>Hồ sơ này không tồn tại, đã bị xóa, hoặc link không đúng.</p>
      <div class="hero-actions" style="margin-top:18px;">
        <a href="./profiles.html" class="btn btn-primary">Quay lại danh sách</a>
      </div>
    </div>
  `;
}

function renderProfile(user) {
  const avatar = user.avatarUrl || DEFAULT_AVATAR;
  const name = escapeHtml(user.name || "Chưa có tên");
  const age = user.age ? `, ${escapeHtml(user.age)} tuổi` : "";
  const city = escapeHtml(user.city || "Chưa rõ thành phố");
  const state = user.state ? `, ${escapeHtml(user.state)}` : "";
  const gender = escapeHtml(user.gender || "Chưa cập nhật");
  const job = escapeHtml(user.job || "Chưa cập nhật");
  const goal = escapeHtml(user.goal || "Chưa cập nhật");
  const platform = escapeHtml(user.platform || "Chưa cập nhật");
  const liveSlot = escapeHtml(user.liveSlot || "Chưa chọn");
  const bio = escapeHtml(user.bio || "Chưa có giới thiệu.");

  profileBox.innerHTML = `
    <div class="profile-shell">
      <div class="glass-card profile-left">
        <div class="avatar-wrap">
          <div class="avatar-ring"></div>
          <img
            src="${avatar}"
            alt="${name}"
            class="profile-avatar"
            onerror="this.onerror=null;this.src='${DEFAULT_AVATAR}'"
          >
        </div>

        <h2 class="profile-name">${name}${age}</h2>
        <div class="profile-location">${city}${state}</div>

        <div class="profile-badges">
          <span class="profile-badge">${platform}</span>
          <span class="profile-badge">${goal}</span>
          <span class="profile-badge">${liveSlot}</span>
        </div>

        <div class="profile-actions">
          ${
            user.link
              ? `<a href="${user.link}" target="_blank" rel="noopener" class="btn btn-primary">Mở ${platform}</a>`
              : `<span class="btn btn-primary btn-disabled">Chưa có link liên hệ</span>`
          }
          <a href="./profiles.html" class="btn btn-secondary">Quay lại danh sách</a>
          <a href="./live.html" class="btn btn-secondary">Xem lịch live</a>
        </div>

        <div class="profile-bio-box">
          <h3>Giới thiệu</h3>
          <p>${bio}</p>
        </div>
      </div>

      <div class="glass-card profile-right">
        <div class="section-title" style="text-align:left; margin-bottom:16px;">
          <h2>Thông tin chi tiết</h2>
          <p>Hồ sơ này giúp bạn hiểu rõ hơn trước khi bắt đầu kết nối.</p>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <strong>Giới tính</strong>
            <div class="meta">${gender}</div>
          </div>

          <div class="info-item">
            <strong>Công việc</strong>
            <div class="meta">${job}</div>
          </div>

          <div class="info-item">
            <strong>Mục tiêu</strong>
            <div class="meta">${goal}</div>
          </div>

          <div class="info-item">
            <strong>Nền tảng liên hệ</strong>
            <div class="meta">${platform}</div>
          </div>

          <div class="info-item">
            <strong>Link liên hệ</strong>
            <div class="meta">
              ${
                user.link
                  ? `<a href="${user.link}" target="_blank" rel="noopener">${escapeHtml(user.link)}</a>`
                  : `Chưa có link liên hệ`
              }
            </div>
          </div>

          <div class="info-item">
            <strong>Khung giờ live</strong>
            <div class="meta">${liveSlot}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function loadProfile() {
  if (!id) {
    renderNotFound();
    return;
  }

  try {
    const user = await getProfileById(id);

    if (!user) {
      renderNotFound();
      return;
    }

    renderProfile(user);
  } catch (err) {
    console.error("Lỗi load profile Firebase:", err);
    renderNotFound();
  }
}

loadProfile();
</script>

</body>
</html>
