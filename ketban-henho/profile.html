<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ thành viên | Kết Nối Việt Mỹ</title>
  <meta name="description" content="Xem hồ sơ chi tiết của thành viên trên Kết Nối Việt Mỹ.">
  <link rel="stylesheet" href="./assets/css/styles.css">

  <style>
    .profile-top {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.05);
    }

    .profile-name {
      margin: 0;
      font-size: 1.5rem;
    }

    .profile-location {
      margin-top: 6px;
      color: var(--muted, #999);
    }

    .profile-bio {
      margin-top: 14px;
      line-height: 1.6;
      color: var(--muted, #bbb);
    }

    .btn-disabled {
      opacity: .6;
      pointer-events: none;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a href="./index.html" class="brand">
      <span class="brand-badge">❤</span>
      <span>Kết Nối Việt Mỹ</span>
    </a>

    <nav class="nav-links">
      <a href="/">Về hoaidang.com</a>
      <a href="./profiles.html">Thành viên</a>
      <a href="./register.html">Đăng ký</a>
      <a href="./live.html">Lịch live</a>
      <a href="./my-profile.html">Hồ sơ của tôi</a>

      <span id="authUser" class="auth-user"></span>

      <button id="loginBtn" class="btn btn-secondary" type="button">Đăng nhập Google</button>
      <button id="logoutBtn" class="btn btn-secondary" type="button" style="display:none;">Đăng xuất</button>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container form-wrap">
      <div class="hero-card">
        <div class="eyebrow">👤 Hồ sơ thành viên</div>
        <h1>Xem kỹ hơn. <span>Biết rõ hơn trước khi kết nối.</span></h1>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container form-wrap">
      <div id="profileBox"></div>
    </div>
  </section>

  <section class="footer">
    <div class="container">
      © 2026 Kết Nối Việt Mỹ • TikTok:
      <a href="https://www.tiktok.com/@hoaidangllc" target="_blank">@hoaidangllc</a>
    </div>
  </section>
</main>

<script type="module" src="/assets/js/auth.js"></script>

<script type="module">
import { getProfileById } from "./assets/js/ketnoi-firebase.js";

const profileBox = document.getElementById("profileBox");
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const DEFAULT_AVATAR = "./image/default-avatar.png";

function renderNotFound() {
  profileBox.innerHTML = `
    <div class="form-card">
      <h2>Không tìm thấy hồ sơ</h2>
      <p>Hồ sơ này không tồn tại hoặc đã bị xóa.</p>
      <a href="./profiles.html" class="btn btn-primary">Quay lại</a>
    </div>
  `;
}

function renderProfile(user) {
  const avatar = user.avatarUrl || DEFAULT_AVATAR;

  profileBox.innerHTML = `
    <div class="form-card">

      <div class="profile-top">
        <img 
          src="${avatar}" 
          class="profile-avatar"
          onerror="this.src='${DEFAULT_AVATAR}'"
        >

        <div>
          <h2 class="profile-name">
            ${user.name || "Chưa có tên"}
            ${user.age ? `, ${user.age} tuổi` : ""}
          </h2>

          <div class="profile-location">
            ${user.city || "Chưa rõ thành phố"}
            ${user.state ? `, ${user.state}` : ""}
          </div>
        </div>
      </div>

      ${user.bio ? `<div class="profile-bio">${user.bio}</div>` : ""}

      <div class="list">

        <div class="member-item">
          <strong>Giới tính</strong>
          <div class="meta">${user.gender || "Chưa cập nhật"}</div>
        </div>

        <div class="member-item">
          <strong>Công việc</strong>
          <div class="meta">${user.job || "Chưa cập nhật"}</div>
        </div>

        <div class="member-item">
          <strong>Mục tiêu</strong>
          <div class="meta">${user.goal || "Chưa cập nhật"}</div>
        </div>

        <div class="member-item">
          <strong>Nền tảng liên hệ</strong>
          <div class="meta">${user.platform || "Chưa cập nhật"}</div>
        </div>

        <div class="member-item">
          <strong>Khung giờ live</strong>
          <div class="meta">${user.liveSlot || "Chưa chọn"}</div>
        </div>

      </div>

      <div class="hero-actions" style="margin-top:24px;">
        <a href="./profiles.html" class="btn btn-secondary">Quay lại</a>

        ${
          user.link
            ? `<a href="${user.link}" target="_blank" class="btn btn-primary">Mở ${user.platform}</a>`
            : `<span class="btn btn-primary btn-disabled">Chưa có link</span>`
        }
      </div>

    </div>
  `;
}

async function loadProfile() {
  if (!id) return renderNotFound();

  try {
    const user = await getProfileById(id);
    if (!user) return renderNotFound();
    renderProfile(user);
  } catch (err) {
    console.error(err);
    renderNotFound();
  }
}

loadProfile();
</script>

</body>
</html>
