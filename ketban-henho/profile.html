<html lang="vi">
<body>
  <header class="main-header">
    <div class="container header-inner">
      <div class="logo"><a href="/">Kết Nối Việt Mỹ</a></div>
      <nav class="nav">
        <a href="./index.html">Trang chủ</a>
        <a href="./profiles.html" class="active">Thành viên</a>
        <a href="./register.html">Tạo hồ sơ</a>
        <a href="./live.html">Live cuối tuần</a>
      </nav>
      <div class="auth-box">
        <span id="authUser" class="auth-user"></span>
        <button id="loginBtn" class="btn btn-primary" type="button">Đăng nhập Google</button>
        <button id="logoutBtn" class="btn btn-outline" type="button" style="display:none;">Đăng xuất</button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container" id="profileDetail"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 Kết Nối Việt Mỹ</p>
    </div>
  </footer>

  <script>
    const profileDetail = document.getElementById('profileDetail');
    const params = new URLSearchParams(window.location.search);
    const id = Number(params.get('id'));
    const profiles = JSON.parse(localStorage.getItem('ketnoi_profiles') || '[]');
    const p = profiles[id];

    if (!p) {
      profileDetail.innerHTML = `
        <div class="card empty-card">
          <h1>Không tìm thấy hồ sơ</h1>
          <p>Hồ sơ này không tồn tại hoặc đã bị xóa.</p>
          <a class="btn btn-primary" href="./profiles.html">Quay lại danh sách</a>
        </div>
      `;
    } else {
      profileDetail.innerHTML = `
        <article class="card detail-card">
          <div class="profile-top detail-top">
            <div class="avatar-circle large">${(p.name || '?').trim().charAt(0).toUpperCase()}</div>
            <div>
              <h1>${p.name || 'Ẩn danh'}</h1>
              <p>${p.age || ''} • ${p.state || ''}</p>
            </div>
          </div>

          <div class="detail-grid">
            <div>
              <h3>Nghề nghiệp</h3>
              <p>${p.job || 'Chưa cập nhật'}</p>
            </div>
            <div>
              <h3>Mục tiêu</h3>
              <p>${p.goal || 'Kết nối'}</p>
            </div>
            <div>
              <h3>Sở thích</h3>
              <p>${p.hobby || 'Chưa cập nhật'}</p>
            </div>
            <div>
              <h3>Liên hệ</h3>
              <p>${p.contact || 'Chưa cập nhật'}</p>
            </div>
          </div>

          <div class="detail-bio">
            <h3>Giới thiệu</h3>
            <p>${p.bio || 'Chưa có mô tả.'}</p>
          </div>

          <a class="btn btn-outline" href="./profiles.html">← Quay lại danh sách</a>
        </article>
      `;
    }
  </script>
  <script type="module" src="/assets/js/auth.js"></script>
</body>
</html>
