<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NBA Picks Demo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1019;
      color: #fff;
    }

    .header {
      padding: 15px;
      background: #111827;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .game {
      background: #151d30;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    .teams {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .score {
      font-size: 20px;
      font-weight: bold;
    }

    .status {
      font-size: 14px;
      margin-bottom: 10px;
      color: #aaa;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      background: #1f2937;
    }

    .btn:hover {
      background: #374151;
    }

    .locked {
      background: #333;
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="header">NBA PICKS DEMO</div>

<div id="games"></div>

<script>

const games = [
  {
    home: "Lakers",
    away: "Rockets",
    homeScore: 0,
    awayScore: 0,
    startTime: new Date().getTime() + 60000 // 1 phút nữa bắt đầu
  }
];

function getStatus(game) {
  const now = Date.now();

  if (now < game.startTime) return "UPCOMING";
  if (now < game.startTime + 2 * 60 * 60 * 1000) return "LIVE";
  return "FINAL";
}

function render() {
  const container = document.getElementById("games");
  container.innerHTML = "";

  games.forEach((game, index) => {
    const status = getStatus(game);

    if (status === "LIVE") {
      game.homeScore += Math.floor(Math.random() * 3);
      game.awayScore += Math.floor(Math.random() * 3);
    }

    const div = document.createElement("div");
    div.className = "game";

    div.innerHTML = `
      <div class="status">${status}</div>

      <div class="teams">
        <div>${game.home}</div>
        <div class="score">${game.homeScore} - ${game.awayScore}</div>
        <div>${game.away}</div>
      </div>

      <div class="buttons">
        <div class="btn ${status !== 'UPCOMING' ? 'locked' : ''}">
          ${game.home} -3.5 (-110)
        </div>
        <div class="btn ${status !== 'UPCOMING' ? 'locked' : ''}">
          ${game.away} +3.5 (-105)
        </div>
      </div>
    `;

    container.appendChild(div);
  });
}

setInterval(render, 2000);
render();

</script>

</body>
</html>
